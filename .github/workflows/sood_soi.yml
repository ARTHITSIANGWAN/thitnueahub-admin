name: 🚀 TNH_AI_SOOD_SOI_UNIFIER_V4_OPTIMIZED
on:
  workflow_dispatch:

jobs:
  push_to_empire:
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Step 1: Checkout Source
        uses: actions/checkout@v4

      # ใช้การ sync โดยตรงเพื่อลดการสร้างไฟล์ซ้ำซ้อน (Direct Pipe)
      - name: 🚚 Step 2: Streamline to Destination
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          # ตั้งค่า Identity
          git config --global user.name "TNH-AI-JOD-L5"
          git config --global user.email "jod@tnh.ai"
          
          # ใช้ Sparse Checkout แทนการ Clone ทั้งดุ้น เพื่อประหยัด RAM/Disk
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/ARTHITSIANGWAN/TNH-AI-9th-Era-of-Fire-AI-Orchestra-Mastering-Go-Engine- destination
          
          TARGET_DIR="destination/from_$(basename $GITHUB_REPOSITORY)"
          mkdir -p $TARGET_DIR
          
          # คัดกรองไฟล์แบบเน้นๆ โดยไม่สร้าง Folder bundle พร่ำเพรื่อ
          find . -maxdepth 1 -not -path '*/.*' -not -name 'destination' -not -name 'bundle' -exec cp -r {} $TARGET_DIR/ \;
          
          cd destination
          git add .
          git commit -m "L5: [สุดซอย V4] หลอมรวมโค้ดคลีนๆ เข้าสู่ Go Engine ฐานบัญชาการเรียบร้อย!" || echo "No changes"
          git push origin main
          
