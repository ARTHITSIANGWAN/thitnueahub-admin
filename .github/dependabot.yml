version: 2
updates:
  # 1. สำหรับภาษา Go (เน้นความแม่นยำของโมดูล)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"

  # 2. สำหรับ npm (หากมีโปรเจกต์ย่อยที่ใช้ package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # 3. สำหรับ GitHub Actions (อัปเดตพวก Workflow ที่พี่ใช้งานอยู่)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      
