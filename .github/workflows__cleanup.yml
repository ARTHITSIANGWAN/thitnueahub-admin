# 🌱 [TNH-AI-V83-TRINITY-EMPIRE | L5-JOD-MISSION] 🫟
name: TNH_AI_V83_CLEANUP_MISSION
on: [workflow_dispatch]

permissions:
  contents: write # ให้สิทธิ์ไอ้จ๊อดเขียนลง Repo ได้

jobs:
  jod_cleaner_task:
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Step 1: Checkout 11-General Core
        uses: actions/checkout@v4

      - name: 👾 Step 2: ไอ้จ๊อดล้างขยะและย้ายไฟล์
        run: |
          echo "ไอ้จ๊อดมาแล้วโว้ยฯ กำลังตรวจสอบและจัดระเบียบ..."
          mkdir -p assets/rainbow/
          
          # ท่าไม้ตายไอ้จ๊อด: ลบขยะสะสม
          if [ -d "_site" ]; then rm -rf _site; echo "ขยะ _site ถูกทำลายแล้ว"; fi
          
          # เพิ่มการทำความสะอาดไฟล์ temp ที่อาจค้าง
          find . -name "*.tmp" -type f -delete
          
      - name: ✅ Step 3: บันทึกสัจจะลงมหาจักรวรรดิ
        run: |
          git config --global user.name "TNH-AI-JOD-L5"
          git config --global user.email "jod@tnh.ai"
          git add .
          # เช็กก่อนว่ามีอะไรต้อง commit ไหม เพื่อป้องกันการ fail
          if ! git diff-index --quiet HEAD --; then
            git commit -m "L5: ล้างป่าช้าและจัดระเบียบ Assets เรียบร้อยก้าบอส! 🤫"
            git push
          else
            echo "มหาอาณาจักรสะอาดอยู่แล้ว ไม่จำเป็นต้อง Commit ก้า"
          fi
# 🫟 [TNH-AI-V83-TRINITY-EMPIRE | END] 🌱
