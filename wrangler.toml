#:schema node_modules/wrangler/config-schema.json
# มหาอาณาจักร TNH AI - PROJECT PROFILE ENGINE (Public Access)
name = "thitnueahub-admin"
main = "src/index.ts"
compatibility_date = "2026-05-06"
compatibility_flags = [ "nodejs_compat" ]

# [CORE ENGINE: GO-WASM]
[wasm_modules]
GO_ENGINE = "build/engine.wasm"

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# [BINDINGS: สัจจะข้อมูล & ระบบสลับราง]
[[d1_databases]]
binding = "DB" 
database_name = "thitnueahub-core-db"
database_id = "6a8b4373-bf40-4b63-bb02-f612ecbe63b7"

[[r2_buckets]]
binding = "TNH_R2"
bucket_name = "thitnueahub-assets"

[[kv_namespaces]]
binding = "TNH_KV"
id = "2fa0a4773efa4a18b1534274d238dd76"

[ai]
binding = "AI"
