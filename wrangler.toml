#:schema node_modules/wrangler/config-schema.json
# มหาอาณาจักร TNH AI V83 TRINITY EMPIRE ENGINE
name = "tnh"
main = "src/index.ts"
compatibility_date = "2026-05-06"
compatibility_flags = [ "nodejs_compat" ]

# ==========================================================
# [WASM RULES CONFIGURATION]
# เปิดวาล์วพิเศษให้เอนจิ้นยอมรับการรันไฟล์ภาษา Go (.wasm) ร่วมกับ TypeScript
# ปรับเป็น CompiledWasm พร้อมสั่ง fallthrough = true เพื่อลบ Warning ขยะระบบ
# ==========================================================
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# ==========================================================
# [RESOURCE BINDINGS - ZERO-GARBAGE TARGET PORT]
# ==========================================================

# 1. การตั้งค่าฐานข้อมูล D1 สัจจะข้อมูล (ตารางสิทธิ์ขุนพลเสือขาว)
[[d1_databases]]
binding = "DB" 
database_name = "thitnueahub-core-db"
database_id = "6a8b4373-bf40-4b63-bb02-f612ecbe63b7"

# 2. การเชื่อมต่อ R2 สำหรับเก็บรูปภาพและไฟล์มีเดีย
[[r2_buckets]]
binding = "TNH_R2"
bucket_name = "thitnueahub-assets"

# 3. การเชื่อมต่อ KV สำหรับบันทึกสถานะระบบล็อกไทม์สแตมป์
[[kv_namespaces]]
binding = "TNH_KV"
id = "2fa0a4773efa4a18b1534274d238dd76"

# 4. ตั้งค่าระบบ AI Edge สำหรับประมวลผลโมเดลสายตา (LlaVA Model)
[ai]
binding = "AI"
