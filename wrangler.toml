# wrangler.toml (ฉบับล็อกสิทธิเด็ดขาดไม่มั่ว)
name = "tnh-ai-v83-trinity-empire" # ล็อกชื่อให้ตรงกับระบบหลักถาวรเพื่อเคลียร์คำเตือน CI
main = "src/index.ts"
compatibility_date = "2026-07-04"

# ระบบสังเกตการณ์ที่ปลอดภัยตามพิมพ์เขียว (🌱 j + ทอม 👾)
[observability.traces]
enabled = true
destinations = [ "tnh-tracing-hub" ]
head_sampling_rate = 0.05
persist = false

[observability.logs]
enabled = true
destinations = [ "tnh-log-sink" ]
head_sampling_rate = 0.60
persist = false
